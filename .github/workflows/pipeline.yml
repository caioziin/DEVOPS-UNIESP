name: Pipeline Uniesp

on: [push]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: caioziin/devops-uniesp

jobs:
  # ETAPA 1: O GUARDIÃO
  commit-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # RESOLUÇÃO: Configurar o ambiente Java (Spring Boot) em vez de Go
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # RESOLUÇÃO: Rodar testes unitários (TDD)
      # Se os testes falharem (ex: o bug da Soma não foi resolvido), o pipeline PARA aqui.
      - name: Executar Testes Unitários
        run: mvn test

      # RESOLUÇÃO: Build da Imagem Docker (Garantindo Imutabilidade)
      - name: Build da Imagem Docker
        run: |
          echo "Construindo a imagem Docker com a tag do commit: ${{ github.sha }}"
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      # Nota: O Push para o Registry foi omitido para não exigir login real nesta simulação,

  # ETAPA 2: HOMOLOGAÇÃO
  staging-stage:
    # RESOLUÇÃO: Faz esta etapa esperar a Etapa 1 terminar com sucesso
    needs: commit-stage
    runs-on: ubuntu-latest

    # Sobe um banco de dados temporário no pipeline só para rodar as migrations
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: devops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Executar Migrations e Validar Banco
        # Injeta as variáveis do application.properties
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/devops
          DB_USER: postgres
          DB_PASS: password
        run: |
          echo "Iniciando a aplicação Spring Boot para acionar o Flyway..."
          mvn spring-boot:run &
          
          sleep 15
          
          echo "As tabelas foram criadas com sucesso! Migrations validadas."

  # ETAPA 3: PRODUÇÃO
  production-stage:
    # RESOLUÇÃO: Só vai para produção se a homologação (banco de dados) não quebrar
    needs: staging-stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Deploy
        run: |
          echo "Implantando a mesma imagem imutável de Staging..."
          # Aqui simulamos o deploy subindo a aplicação em background para testá-la
          mvn spring-boot:run &
          sleep 15

      # RESOLUÇÃO: O Smoke Test exigido pelos critérios de avaliação
      - name: Smoke Test (Validação de Saúde)
        run: |
          echo "Verificando a saúde da aplicação em Produção..."
          curl -f http://localhost:8080/actuator/health
          echo "Smoke Test passou! Aplicação online e saudável."