name: CI/CD � Build ? Staging ? Production

on:
  push:
    branches: ["main", "develop", "feat-PedroH"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-app

jobs:
  commit:
    name: "Etapa Commit: Build, Test e Push"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Gerar tag imutavel
        id: tag
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "image_tag=sha-${SHA}" >> $GITHUB_OUTPUT

      - name: Build e Push da imagem imutavel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  staging:
    name: "Etapa Staging: Migrations e Health Check"
    runs-on: ubuntu-latest
    needs: commit
    if: github.event_name != 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: devops_staging
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull imagem imutavel
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.commit.outputs.image_tag }}
        run: |
          IMAGE="docker.io/${DOCKERHUB_USERNAME}/devops-app:${IMAGE_TAG}"
          echo "Puxando imagem: ${IMAGE}"
          docker pull ${IMAGE}
          echo "FULL_IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Subir aplicacao em Staging
        run: |
          docker run -d \
            --name app-staging \
            --network host \
            -e DATABASE_URL="jdbc:postgresql://localhost:5432/devops_staging?user=postgres&password=${{ secrets.DB_PASSWORD }}" \
            -e SPRING_PROFILES_ACTIVE=staging \
            ${{ env.FULL_IMAGE }}

      - name: Health check Staging
        run: |
          echo "Aguardando /health responder..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Aplicacao respondeu HTTP 200 em Staging"
              exit 0
            fi
            echo "Tentativa $i/30 � status: $STATUS"
            sleep 3
          done
          echo "Aplicacao nao subiu em Staging"
          docker logs app-staging
          exit 1

  production:
    name: "Etapa Production: Deploy e Smoke Test"
    runs-on: ubuntu-latest
    needs: [commit, staging]
    if: github.event_name != 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: devops_prod
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull imagem imutavel para Production
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.commit.outputs.image_tag }}
        run: |
          IMAGE="docker.io/${DOCKERHUB_USERNAME}/devops-app:${IMAGE_TAG}"
          echo "Imagem para producao: ${IMAGE}"
          docker pull ${IMAGE}
          echo "FULL_IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy em Production
        run: |
          docker run -d \
            --name app-prod \
            --network host \
            -e DATABASE_URL="jdbc:postgresql://localhost:5432/devops_prod?user=postgres&password=${{ secrets.DB_PASSWORD }}" \
            -e SPRING_PROFILES_ACTIVE=production \
            ${{ env.FULL_IMAGE }}

      - name: Smoke Test no endpoint /health
        run: |
          echo "Executando Smoke Test em Production..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "SMOKE TEST PASSOU � HTTP 200 confirmado em Production!"
              exit 0
            fi
            echo "Tentativa $i/20 � HTTP $STATUS"
            sleep 5
          done
          docker logs app-prod
          exit 1